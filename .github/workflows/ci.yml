name: ArchitectOS CI


on:

  push:

    branches:
      - main


  pull_request:

    branches:
      - main



jobs:


  build:


    name: Build and Test


    runs-on: ubuntu-latest



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4



      - name: Setup Java 17

        uses: actions/setup-java@v4

        with:

          java-version: '17'

          distribution: 'temurin'

          cache: maven



      - name: Run Maven Tests

        working-directory: engine

        run: mvn test
